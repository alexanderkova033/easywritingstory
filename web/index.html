      <div class="ep-noscript">
        <h1>easywriting-story</h1>
        <p class="ep-tagline">A quiet place to write a short story.</p>

        <p>A private, browser-based short-story workshop. Draft on the left; word count, reading grade, dialogue %, repetition, and spelling update beside you. Optional AI feedback on demand. Nothing leaves your browser unless you ask it to.</p>

        <h2>What it does</h2>
        <ul>
          <li><strong>Local-first.</strong> Drafts, snapshots, goals, and personal dictionary live in your browser. Works offline after first load.</li>
          <li><strong>Prose-specific tools.</strong> Word count, sentence-length variation, Flesch-Kincaid reading grade, dialogue share, repetition, spelling.</li>
          <li><strong>IGCSE-friendly targets.</strong> Story-length presets (Flash 500w / Short 1000w / IGCSE 1500w / Long 2000w).</li>
          <li><strong>Optional AI.</strong> Selection-scoped rewrites, feedback on demand, idea sparks. No signup.</li>
          <li><strong>Calm UI.</strong> No popups, no nags. Tools speak when asked.</li>
        </ul>

        <h2>Sample opening from the app</h2>
        <div class="ep-sample"><em>"The Last Bus"</em>The platform sign blinked once and went dark. Maya pulled her sleeves over her hands and counted the people left waiting: three. An old man with a folded newspaper. A girl in a school blazer too thin for the rain. And the man by the timetable, who had not looked up since she arrived.

She told herself it was only a delay. It was always only a delay.</div>

        <div class="ep-notice">
          <strong>JavaScript is required to use the workshop.</strong>
          The editor, word counter, analysis tools, and everything else run client-side in JavaScript — there's no server to render them. Enable JavaScript in your browser settings (or whitelist this site in your content blocker) and reload to start writing.
